services:
  - type: web
    name: alphafx-trading
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_CLIENT_CODE
        sync: false
      - key: ANGEL_PIN
        sync: false
      - key: ANGEL_TOTP_SECRET
        sync: false
